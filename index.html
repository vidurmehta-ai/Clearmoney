<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearMoney Weekly — Content Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --accent: #00e5a0;
    --accent2: #7c6aff;
    --accent3: #ff6a6a;
    --text: #f0f0f8;
    --muted: #7a7a9a;
    --card: #16161f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }
  .header { margin-bottom: 40px; }
  .logo-row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--text), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 14px; font-weight: 300; margin-left: 58px; }
  .segment-row { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .seg-label { font-size: 13px; color: var(--muted); align-self: center; margin-right: 4px; }
  .seg-btn {
    padding: 8px 18px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .seg-btn:hover { border-color: var(--accent); color: var(--accent); }
  .seg-btn.active { background: rgba(0,229,160,0.1); border-color: var(--accent); color: var(--accent); }
  .gen-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--accent), #00b87a);
    border: none; border-radius: 14px;
    color: #0a0a0f; font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.25s; margin-bottom: 28px; letter-spacing: 0.3px;
  }
  .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,229,160,0.25); }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .loading { display: none; text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
  .loading.show { display: block; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  .output { display: none; }
  .output.show { display: block; }
  .section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; margin-bottom: 20px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .section:hover { border-color: rgba(0,229,160,0.2); }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .section-label {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif; font-size: 12px;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--accent); }
  .dot-purple { background: var(--accent2); }
  .dot-yellow { background: #ffd166; }
  .dot-blue { background: #6af4ff; }
  .dot-red { background: var(--accent3); }
  .copy-btn {
    padding: 6px 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.08); }
  .section-body { padding: 20px; }
  .hook-text {
    font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700;
    line-height: 1.3; color: var(--text);
    border-left: 3px solid var(--accent); padding-left: 16px;
  }
  .slides-grid { display: grid; gap: 10px; }
  .slide-item {
    background: var(--surface2); border-radius: 10px;
    padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start;
  }
  .slide-num {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    color: #fff; flex-shrink: 0;
  }
  .slide-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .slide-body { font-size: 13px; color: var(--muted); line-height: 1.5; font-weight: 300; }
  .caption-text { font-size: 14px; line-height: 1.8; color: var(--text); font-weight: 300; white-space: pre-wrap; }
  .hashtag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
  .hashtag {
    padding: 5px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 12px; color: var(--accent2);
  }
  .affiliate-card { display: flex; align-items: flex-start; gap: 14px; }
  .aff-icon {
    width: 42px; height: 42px;
    background: rgba(255,166,0,0.1); border: 1px solid rgba(255,166,0,0.2);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .aff-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .aff-desc { font-size: 13px; color: var(--muted); line-height: 1.5; font-weight: 300; }
  .aff-commission {
    display: inline-block; margin-top: 8px; padding: 3px 10px;
    background: rgba(255,209,102,0.1); border: 1px solid rgba(255,209,102,0.2);
    border-radius: 20px; font-size: 12px; color: #ffd166; font-weight: 500;
  }
  .tip-box {
    background: rgba(124,106,255,0.06); border: 1px solid rgba(124,106,255,0.2);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
    font-size: 13px; color: var(--muted); line-height: 1.6;
  }
  .tip-box strong { color: var(--accent2); }
  .error-box {
    display: none; background: rgba(255,106,106,0.08);
    border: 1px solid rgba(255,106,106,0.2); border-radius: 12px;
    padding: 16px 20px; margin-bottom: 20px;
    font-size: 14px; color: var(--accent3);
  }
  .error-box.show { display: block; }
  .footer {
    text-align: center; color: var(--muted); font-size: 12px;
    margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); font-weight: 300;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">💸</div>
      <h1>ClearMoney Weekly</h1>
    </div>
    <p class="subtitle">Instagram Carousel Generator — USA Personal Finance</p>
  </div>

  <div class="segment-row">
    <span class="seg-label">Audience:</span>
    <button class="seg-btn active" data-seg="beginner" onclick="selectSeg(this)">🌱 Beginner</button>
    <button class="seg-btn" data-seg="young_pro" onclick="selectSeg(this)">💼 Young Professional</button>
    <button class="seg-btn" data-seg="freedom" onclick="selectSeg(this)">🚀 Financial Freedom</button>
  </div>

  <button class="gen-btn" id="genBtn" onclick="generate()">⚡ Generate Today's Carousel</button>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Writing your carousel in human tone...
  </div>

  <div class="output" id="output">
    <div class="tip-box" id="postingTip"></div>

    <div class="section">
      <div class="section-header">
        <div class="section-label"><span class="dot dot-green"></span>Slide 1 — Hook</div>
        <button class="copy-btn" onclick="copyEl('hookText', this)">Copy</button>
      </div>
      <div class="section-body"><div class="hook-text" id="hookText"></div></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label"><span class="dot dot-purple"></span>Slides 2–9 — Content</div>
        <button class="copy-btn" onclick="copyEl('slidesRaw', this)">Copy All</button>
      </div>
      <div class="section-body">
        <div class="slides-grid" id="slidesGrid"></div>
        <div id="slidesRaw" style="display:none"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label"><span class="dot dot-yellow"></span>Caption</div>
        <button class="copy-btn" onclick="copyEl('captionText', this)">Copy</button>
      </div>
      <div class="section-body"><div class="caption-text" id="captionText"></div></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label"><span class="dot dot-blue"></span>Hashtags</div>
        <button class="copy-btn" onclick="copyEl('hashtagsRaw', this)">Copy</button>
      </div>
      <div class="section-body">
        <div class="hashtag-cloud" id="hashtagCloud"></div>
        <div id="hashtagsRaw" style="display:none"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label"><span class="dot dot-red"></span>Today's Affiliate Pick</div>
        <button class="copy-btn" onclick="copyEl('affCta', this)">Copy CTA</button>
      </div>
      <div class="section-body">
        <div class="affiliate-card">
          <div class="aff-icon" id="affIcon"></div>
          <div>
            <div class="aff-name" id="affName"></div>
            <div class="aff-desc" id="affDesc"></div>
            <div class="aff-commission" id="affCommission"></div>
          </div>
        </div>
        <div id="affCta" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="footer">ClearMoney Weekly © 2026 — Powered by Claude AI</div>
</div>

<script>
let activeSeg = 'beginner';

function selectSeg(btn) {
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSeg = btn.dataset.seg;
}

async function generate() {
  const btn = document.getElementById('genBtn');
  const loading = document.getElementById('loading');
  const output = document.getElementById('output');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = true;
  btn.textContent = 'Generating...';
  loading.classList.add('show');
  output.classList.remove('show');
  errorBox.classList.remove('show');

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ segment: activeSeg })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error || 'Something went wrong. Please try again.');
    }

    render(data);

  } catch(err) {
    errorBox.textContent = '⚠️ ' + err.message;
    errorBox.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ Generate Today\'s Carousel';
    loading.classList.remove('show');
  }
}

function render(data) {
  document.getElementById('postingTip').innerHTML = '<strong>📅 Posting Tip:</strong> ' + data.posting_tip;
  document.getElementById('hookText').textContent = data.hook;

  const grid = document.getElementById('slidesGrid');
  grid.innerHTML = '';
  let raw = '';
  data.slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide-item';
    div.innerHTML = `<div class="slide-num">${i+2}</div><div><div class="slide-title">${s.title}</div><div class="slide-body">${s.body}</div></div>`;
    grid.appendChild(div);
    raw += `Slide ${i+2}: ${s.title}\n${s.body}\n\n`;
  });
  document.getElementById('slidesRaw').textContent = raw.trim();
  document.getElementById('captionText').textContent = data.caption;

  const cloud = document.getElementById('hashtagCloud');
  cloud.innerHTML = '';
  let hraw = '';
  data.hashtags.forEach(h => {
    const tag = h.startsWith('#') ? h : '#'+h;
    const span = document.createElement('span');
    span.className = 'hashtag';
    span.textContent = tag;
    cloud.appendChild(span);
    hraw += tag + ' ';
  });
  document.getElementById('hashtagsRaw').textContent = hraw.trim();

  const aff = data.affiliate;
  document.getElementById('affIcon').textContent = aff.icon;
  document.getElementById('affName').textContent = aff.name;
  document.getElementById('affDesc').textContent = aff.desc;
  document.getElementById('affCommission').textContent = '💰 ' + aff.commission;
  document.getElementById('affCta').textContent = aff.cta;

  document.getElementById('output').classList.add('show');
  document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
}

function copyEl(id, btn) {
  const text = document.getElementById(id).textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
